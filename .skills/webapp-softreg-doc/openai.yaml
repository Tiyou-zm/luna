interface:
  display_name: "网页软著文档"
  short_description: "审阅网页应用并生成高质量软著附件与中文软件说明书"
  icon_small: "./assets/webapp-softreg-small.svg"
  icon_large: "./assets/webapp-softreg-large.svg"
  brand_color: "#2F5FA7"
  default_prompt: "Use $webapp-softreg-doc to review a web app and produce a strict simplified-Chinese software copyright documentation package. If no sample manual is provided, automatically use the built-in formal review style and expand the document using only verified UI facts."

policy:
  allow_implicit_invocation: true
